[theme]
primaryColor = "#7c3aed"
backgroundColor = "#0a0e1a"
secondaryBackgroundColor = "#111827"
textColor = "#f8fafc"
font = "sans serif"

[client]
showErrorDetails = true

[logger]
level = "info"

[server]
headless = true
runOnSave = true
port = 8501
maxUploadSize = 200

[browser]
gatherUsageStats = false
serverAddress = "localhost"
